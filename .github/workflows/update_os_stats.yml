name: Update RPi OS Stats

on:
  schedule:
    - cron: '0 0 * * 1' # Jeden Montag um 00:00 UTC
  workflow_dispatch:   # Erlaubt manuelles Starten über das GitHub-UI

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Erforderlich zum Pushen der Änderungen
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: Run Fetch Script
        run: python scripts/fetch_rpi_os_stats.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add social_drafts/rpi_os_stats.json
          git commit -m "🤖 Automatische Aktualisierung der RPi OS Statistiken" || echo "Keine Änderungen zum Committen"
          git push
